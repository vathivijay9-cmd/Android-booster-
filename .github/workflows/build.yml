name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Validate Gradle Wrapper or Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # കീസ്റ്റോർ ഫയൽ തനിയെ സെർവറിൽ റൺ ടൈമിൽ ഉണ്ടാക്കുന്നു
      - name: Create Temporary Keystore
        run: |
          keytool -genkey -v -keystore debug.keystore -alias debugConfig -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=Android Debug,O=Android,C=US"
          mkdir -p ~/.gradle/daemon/9.5.1
          cp debug.keystore ~/.gradle/daemon/9.5.1/
          mkdir -p ~/.gradle/daemon/9.6
          cp debug.keystore ~/.gradle/daemon/9.6/

      # ആപ്പ് ബിൽഡ് ചെയ്യുന്നു
      - name: Build with Gradle
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
