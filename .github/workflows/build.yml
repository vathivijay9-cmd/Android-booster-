name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Validate Gradle Wrapper or Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # സിസ്റ്റത്തിലെ കീസ്റ്റോർ ഫയൽ ചെക്കിങ് പൂർണ്ണമായി ഒഴിവാക്കി നോർമൽ ബിൽഡ് ചെയ്യുന്നു
      - name: Build with Gradle (Ignore Signing)
        run: gradle assembleDebug -x validateSigningDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
